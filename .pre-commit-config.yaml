repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
        name: Terraform fmt
        description: Rewrites all Terraform configuration files to canonical format
        entry: terraform_fmt
        language: system
        files: (\.tf|\.tfvars)$
        exclude: \.terraform/.*$

      - id: terraform_validate
        name: Terraform validate
        description: Validates all Terraform configuration files
        entry: terraform_validate
        language: system
        files: (\.tf|\.tfvars)$
        exclude: \.terraform/.*$
        pass_filenames: false

      - id: terraform_docs
        name: Terraform docs
        description: Inserts input and output documentation into README.md
        entry: terraform_docs
        language: system
        args:
          - --args=--output-file=README.md
          - --args=--output-mode=inject
          - --args=markdown
          - --args=table
        files: (\.tf|\.terraform\.lock\.hcl)$
        exclude: \.terraform/.*$

      - id: terraform_tflint
        name: TFLint
        description: Linter for Terraform source code
        entry: terraform_tflint
        language: system
        files: (\.tf|\.tfvars)$
        exclude: \.terraform/.*$
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
        exclude: (\.md|\.tfvars\.example)$

      - id: end-of-file-fixer
        name: Fix end of files
        exclude: \.tfvars\.example$

      - id: check-yaml
        name: Check YAML syntax

      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=1000']

      - id: check-merge-conflict
        name: Check for merge conflicts

      - id: detect-private-key
        name: Detect private keys
